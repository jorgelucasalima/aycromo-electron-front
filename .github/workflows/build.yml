name: Build Windows

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build para Windows
    runs-on: windows-latest

    steps:
    - name: Fazer Checkout do Repositório
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Instalar Dependências
      run: npm ci

    - name: Recompilar Módulos Nativos para o Electron
      run: npx electron-rebuild -f -w onnxruntime-node

    - name: Compilar e Empacotar (Electron Forge)
      run: npm run make
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
        WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

    - name: Upload de Artefatos Gerados (Apenas Backup)
      uses: actions/upload-artifact@v4
      with:
        name: aycromo-build-windows
        path: |
          out/make/**/*.exe
        if-no-files-found: warn

    - name: Publicar Instaladores na Release (Última Versão)
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      with:
        tag_name: "latest"
        name: "Aycromo - Versão Mais Recente (Automática)"
        prerelease: true
        files: |
          out/make/**/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

