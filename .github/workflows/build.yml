name: Build Multiplataforma

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build em ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
    - name: Fazer Checkout do Repositório
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Instalar Dependências
      run: npm ci

    - name: Compilar e Empacotar (Electron Forge)
      run: npm run make
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload de Artefatos Gerados (Apenas Backup)
      uses: actions/upload-artifact@v4
      with:
        name: aycromo-build-${{ matrix.os }}
        path: |
          out/make/**/*.dmg
          out/make/**/*.zip
          out/make/**/*.deb
          out/make/**/*.exe
          out/make/**/*.rpm
          out/make/**/*.AppImage
        if-no-files-found: warn

    - name: Publicar Instaladores na Release (Última Versão)
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      with:
        tag_name: "latest"
        name: "Aycromo - Versão Mais Recente (Automática)"
        prerelease: true
        files: |
          out/make/**/*.dmg
          out/make/**/*.zip
          out/make/**/*.deb
          out/make/**/*.exe
          out/make/**/*.rpm
          out/make/**/*.AppImage
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
